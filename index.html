<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perhitungan Ava Gift</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h2>💸 Perhitungan Ava Gift</h2>

        <div class="input-group">
            <label for="rate">Rate (%)</label>
            <input type="number" id="rate" placeholder="Contoh: 65" min="1" step="any" oninput="hitungTotal()">
        </div>

        <div id="items"></div>

        <button id="btnTambah" class="btn-main">+ Tambah Item</button>

        <h3 id="hasil">Total Setelah di rate: Rp 0</h3>

        <div class="button-group">
            <button id="simpanRiwayat">💾 Simpan Riwayat</button>
            <button id="btnHistory">📋 History</button>
        </div>

        <div style="text-align: center; margin-top: 15px; margin-bottom: 15px;">
            <a href="https://bit.ly/Panduan-Penggunaan-Web" target="_blank" style="color: #6c5ce7; text-decoration: underline; font-size: 14px; display: block; margin-bottom: 8px;">
                📖 Klik di sini untuk Panduan Penggunaan
            </a>
            <a href="https://bit.ly/PRICELIST-UPDATE" target="_blank" style="color: #ff99cc; text-decoration: underline; font-size: 14px;">
                💰 Klik di sini untuk Pricelist Update
            </a>
        </div>

        <div id="historyBox" style="display:none;">
            <h3>📋 Riwayat</h3>
            <div id="riwayat"></div>
            
            <p style="text-align: center; font-size: 12px; color: #aaa; margin-top: 15px; font-weight: bold;">
                by Gilda
            </p>
        </div>

        <p style="text-align: center; color: #ff4d4d; font-size: 14px; margin-top: 20px; font-weight: bold;">
            Dilarang Memperjualbelikan Website ini
        </p>

    </div>

    <script src="script.js"></script>
</body>
</html>
