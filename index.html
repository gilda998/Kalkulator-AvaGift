<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perhitungan Ava Gift</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h2>💸 Perhitungan Ava Gift</h2>

        <div class="input-group">
            <label for="rate">Rate (%)</label>
            <input type="number" id="rate" placeholder="Contoh: 65" oninput="hitungTotal()">
        </div>

        <div id="items"></div>

        <button id="btnTambah">+ Tambah Item</button>

        <h3 id="hasil">Total Setelah di rate: Rp 0</h3>

        <div class="button-group">
            <button id="simpanRiwayat">💾 Simpan</button>
            <button id="btnHistory">📋 History</button>
        </div>

        <div class="footer-links">
            <a href="https://bit.ly/Panduan-Penggunaan-Web" target="_blank">📖 Panduan</a>
            <a href="https://bit.ly/PRICELIST-UPDATE" target="_blank">💰 Pricelist</a>
        </div>

        <!-- Tambahan teks peringatan -->
        <p style="text-align: center; color: #ff4d4d; font-size: 12px; margin-top: 20px; font-weight: bold; opacity: 0.8;">
            Dilarang Memperjualbelikan Website ini
        </p>

        <div id="historyBox" style="display:none; margin-top: 15px;">
            <h3>📋 Riwayat</h3>
            <div id="riwayat"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
